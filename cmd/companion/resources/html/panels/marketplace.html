<!-- 市场面板模板 -->
<!-- marketplace-root 必须设 flex:1;min-height:0 才能被 modal body 约束高度，
     内部列表才会触发 overflow 滚动；移除 min-height 避免强制撑高 modal。 -->
<div id="marketplace-root" style="display:flex;flex-direction:column;gap:0;flex:1;min-height:0;width:100%;">

  <!-- 搜索栏 -->
  <div style="display:flex;flex-direction:row;gap:8px;padding:0 4px 8px 4px;align-items:center;border-bottom:1px solid #2d2d2d;flex-shrink:0;">
    <input id="marketplace-search-input" type="text" placeholder="搜索 MCP 服务器或技能…" style="flex:1;background:#3c3c3c;color:#cccccc;border:1px solid #2d2d2d;padding:6px 8px;font-size:13px;outline:none;" />
    <div class="marketplace-tabs" style="display:flex;flex-direction:row;gap:2px;">
      <div id="marketplace-tab-all" class="marketplace-tab active" onclick="selectMarketTab(0)">全部</div>
      <div id="marketplace-tab-mcp" class="marketplace-tab" onclick="selectMarketTab(1)">MCP</div>
      <div id="marketplace-tab-skill" class="marketplace-tab" onclick="selectMarketTab(2)">技能</div>
    </div>
  </div>

  <!-- 列表（min-height:0 让 flex 子元素可收缩触发 overflow） -->
  <div id="marketplace-list" style="flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;display:flex;flex-direction:column;gap:0;padding:4px 0;">
    <!-- 由 JS/Go 动态填充 -->
  </div>

  <!-- 底部信息 -->
  <div style="display:flex;flex-direction:row;justify-content:space-between;align-items:center;padding:6px 4px 0 4px;border-top:1px solid #2d2d2d;font-size:12px;color:#6e6e6e;flex-shrink:0;">
    <span>共 <span id="marketplace-count">0</span> 个条目</span>
    <span>点击安装后下次对话生效</span>
  </div>
</div>
