<!-- 搜索面板 HTML 模板 -->
<div id="search-root" style="display:flex;flex-direction:column;height:100%;background:#252526;">
  <div style="display:flex;flex-direction:row;align-items:center;padding:8px;gap:4px;background:#2d2d2d;">
    <div id="search-input-placeholder" style="flex:1;"></div>
    <button label="搜索" onclick="onSearch" style="background-color:#0e639c;color:#fff;padding:4px 12px;font-size:13px;"></button>
  </div>
  <div id="search-result-container" class="panel-content" style="flex:1;overflow:auto;"></div>
</div>
